name: Trigger auto deployment for iot-backend-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/iot-backend-app-AutoDeployTrigger-5964221e-3cb1-41f6-a68b-5a3a9f3ad8ed.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.IOTBACKENDAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.IOTBACKENDAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.IOTBACKENDAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.IOTBACKENDAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.IOTBACKENDAPP_REGISTRY_PASSWORD }}
          containerAppName: iot-backend-app
          resourceGroup: iot-basic-rg
          imageToBuild: dani512/iot-backend-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


